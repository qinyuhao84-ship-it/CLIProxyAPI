# CLIProxyAPI configuration for Zeabur deployment with OAuth support
# Based on guide: https://team.choulme.cn/guides/codex-cliproxyapi-guide.html

host: ""
port: 8317

# Management API settings (enabled for remote access to add tokens)
remote-management:
  allow-remote: true  # Allow remote access for management API (needed for Zeabur)
  secret-key: "305d78aa10d4507ba2727174ee4c8eb3d00e2f3d5a16b50cbc7a5b825353a784"  # Management API secret
  disable-control-panel: false

# Authentication directory (default, tokens can also be added via config)
auth-dir: "~/.cli-proxy-api"

# API keys for accessing the proxy - service keys for downstream clients
api-keys:
  - "98bd2990ad08c95be9ef50ea4a521381f0913ff9a4666401"  # Service key for downstream clients

# Enable debug logging for troubleshooting
debug: true

# Commercial mode reduces memory overhead
commercial-mode: true

# Log to stdout (Zeabur captures logs)
logging-to-file: false

# Maximum total log size (MB)
logs-max-total-size-mb: 10

# Routing strategy for multiple accounts
routing:
  strategy: "round-robin"

# Quota exceeded behavior
quota-exceeded:
  switch-project: true
  switch-preview-model: true

# Request retry settings
request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30

# Codex API keys (Add your Codex team account tokens here)
# You can add tokens via Management API after deployment
# Example:
# codex-api-key:
#   - api-key: "sk-atSM..."  # Token from Codex OAuth login
#     prefix: "codex1"
#   - api-key: "sk-atSM..."  # Second account
#     prefix: "codex2"

# Antigravity provider configuration (optional)
# antigravity-api-key:
#   - api-key: "your-antigravity-token"
#     prefix: "antigravity1"

# OAuth model aliases (to be configured after login)
